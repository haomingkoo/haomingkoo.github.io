    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #000000;
        --bg-elevated: #0a0a0a;
        --surface: #111111;
        --border: #1a1a1a;
        --accent: #E8C87A;
        --accent-dim: rgba(232, 200, 122, 0.10);
        --accent-glow: rgba(232, 200, 122, 0.15);
        --text: #f0ede6;
        --text-secondary: #a8a49c;
        --muted: #6b6860;
        --font-display: "Cormorant Garamond", Georgia, serif;
        --font-body: "Inter", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", "Fira Code", monospace;
      }

      [data-theme="light"] {
        --bg: #f5f2eb;
        --bg-elevated: #fffdf7;
        --surface: #eae7e0;
        --border: #d4d0c8;
        --accent: #b8941e;
        --accent-dim: rgba(184, 148, 30, 0.10);
        --accent-glow: rgba(184, 148, 30, 0.15);
        --text: #1a1814;
        --text-secondary: #5c584e;
        --muted: #8a867c;
      }

      html { scroll-behavior: smooth; }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
        font-size: 15px;
        line-height: 1.6;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      /* ── NAV ── */
      .nav-wrap {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        transition: background 0.4s, border-color 0.4s, backdrop-filter 0.4s;
        border-bottom: 1px solid transparent;
      }

      .nav-wrap.scrolled {
        background: rgba(0, 0, 0, 0.65);
        backdrop-filter: blur(20px) saturate(1.8);
        -webkit-backdrop-filter: blur(20px) saturate(1.8);
        border-bottom-color: rgba(255, 255, 255, 0.06);
      }

      [data-theme="light"] .nav-wrap.scrolled {
        background: rgba(245, 242, 235, 0.72);
        border-bottom-color: rgba(0, 0, 0, 0.08);
      }

      nav {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 64px;
      }

      .nav-left {
        display: flex;
        align-items: center;
        gap: 32px;
      }

      .nav-logo {
        font-family: var(--font-display);
        font-size: 22px;
        font-weight: 600;
        color: var(--text);
        text-decoration: none;
        letter-spacing: 0.02em;
        transition: color 0.2s;
      }

      .nav-logo:hover {
        color: var(--accent);
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .nav-links a {
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
        padding: 6px 14px;
        border-radius: 8px;
        transition: color 0.2s, background 0.2s;
        letter-spacing: 0.02em;
      }

      .nav-links a:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.05);
      }

      [data-theme="light"] .nav-links a:hover {
        background: rgba(0, 0, 0, 0.04);
      }

      .nav-links a.active {
        color: var(--accent);
      }

      .nav-right {
        display: flex;
        align-items: center;
      }

      .theme-toggle {
        background: none;
        border: 1px solid var(--border);
        color: var(--text-secondary);
        cursor: pointer;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.2s, border-color 0.2s, background 0.2s;
        font-size: 16px;
        line-height: 1;
      }

      .theme-toggle:hover {
        color: var(--accent);
        border-color: var(--accent);
        background: var(--accent-dim);
      }

      .theme-toggle svg {
        width: 18px;
        height: 18px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* ── HERO ── */
      .hero {
        position: relative;
        height: 100vh;
        min-height: 600px;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        overflow: hidden;
        background: var(--bg);
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          transparent 0%,
          transparent 30%,
          rgba(0, 0, 0, 0.3) 60%,
          rgba(0, 0, 0, 0.85) 100%
        );
        pointer-events: none;
      }

      [data-theme="light"] .hero::after {
        background: linear-gradient(
          to bottom,
          transparent 0%,
          transparent 30%,
          rgba(245, 242, 235, 0.3) 60%,
          rgba(245, 242, 235, 0.9) 100%
        );
      }

      .hero-content {
        position: relative;
        z-index: 2;
        text-align: center;
        padding: 0 40px 80px;
        max-width: 800px;
      }

      .hero-eyebrow {
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 20px;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeUp 0.8s 0.3s forwards;
      }

      .hero-headline {
        font-family: var(--font-display);
        font-size: clamp(48px, 8vw, 96px);
        font-weight: 400;
        font-style: italic;
        line-height: 1.1;
        letter-spacing: -0.02em;
        color: var(--text);
        margin-bottom: 24px;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeUp 0.8s 0.5s forwards;
      }

      .hero-subtitle {
        font-size: 16px;
        line-height: 1.7;
        color: var(--text-secondary);
        max-width: 540px;
        margin: 0 auto;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeUp 0.8s 0.7s forwards;
      }

      .hero-scroll-hint {
        position: absolute;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 2;
        opacity: 0;
        animation: fadeUp 0.8s 1s forwards;
      }

      .hero-scroll-hint span {
        display: block;
        width: 1px;
        height: 40px;
        background: var(--accent);
        margin: 0 auto;
        opacity: 0.4;
        animation: scrollPulse 2s infinite;
      }

      @keyframes fadeUp {
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes scrollPulse {
        0%, 100% { opacity: 0.2; transform: scaleY(0.6); }
        50% { opacity: 0.5; transform: scaleY(1); }
      }

      /* ── MAP SECTION ── */
      .map-section {
        padding: 80px 40px;
        max-width: 1200px;
        margin: 0 auto;
      }

      .section-label {
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 12px;
      }

      .section-heading {
        font-family: var(--font-display);
        font-size: clamp(28px, 4vw, 40px);
        font-weight: 500;
        color: var(--text);
        margin-bottom: 32px;
        letter-spacing: -0.01em;
      }

      .map-container {
        width: 100%;
        height: 400px;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid var(--border);
      }

      .map-container .leaflet-container {
        height: 100%;
        width: 100%;
      }

      .leaflet-container {
        background: var(--bg) !important;
        font-family: var(--font-body) !important;
      }

      .leaflet-popup-content-wrapper {
        background: var(--surface) !important;
        color: var(--text) !important;
        border: 1px solid var(--border) !important;
        border-radius: 10px !important;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5) !important;
      }

      .leaflet-popup-tip {
        background: var(--surface) !important;
      }

      .leaflet-popup-content {
        font-family: var(--font-body) !important;
        font-size: 13px !important;
        margin: 12px 14px !important;
      }

      .leaflet-popup-content strong {
        display: block;
        font-weight: 600;
        margin-bottom: 2px;
      }

      .leaflet-popup-content .popup-date {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--muted);
      }

      .leaflet-control-attribution {
        font-size: 9px !important;
        opacity: 0.4 !important;
      }

      .leaflet-control-zoom a {
        background: var(--surface) !important;
        color: var(--text) !important;
        border-color: var(--border) !important;
      }

      /* ── TRIPS SECTION ── */
      .trips-section {
        padding-top: 40px;
      }

      .trips-header {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 40px 40px;
      }

      .trip-row {
        position: relative;
        display: flex;
        align-items: flex-end;
        height: 80vh;
        min-height: 500px;
        overflow: hidden;
        text-decoration: none;
        color: inherit;
        cursor: pointer;
      }

      .trip-row-bg {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-elevated);
        transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }

      .trip-row:hover .trip-row-bg {
        transform: scale(1.02);
      }

      .trip-row-bg .flag-placeholder {
        font-size: 120px;
        opacity: 0.04;
        user-select: none;
        pointer-events: none;
      }

      [data-theme="light"] .trip-row-bg .flag-placeholder {
        opacity: 0.06;
      }

      .trip-row-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.8) 0%,
          rgba(0, 0, 0, 0.4) 35%,
          rgba(0, 0, 0, 0.05) 70%,
          transparent 100%
        );
        pointer-events: none;
        transition: background 0.3s;
      }

      [data-theme="light"] .trip-row-overlay {
        background: linear-gradient(
          to top,
          rgba(245, 242, 235, 0.92) 0%,
          rgba(245, 242, 235, 0.5) 35%,
          rgba(245, 242, 235, 0.05) 70%,
          transparent 100%
        );
      }

      .trip-row-content {
        position: relative;
        z-index: 2;
        padding: 0 60px 60px;
        width: 100%;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 40px;
      }

      .trip-row-text {
        max-width: 680px;
      }

      .trip-number {
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 12px;
        opacity: 0;
        transform: translateY(16px);
        transition: opacity 0.5s, transform 0.5s;
      }

      .trip-row.revealed .trip-number {
        opacity: 1;
        transform: translateY(0);
      }

      .trip-destination {
        font-family: var(--font-display);
        font-size: clamp(36px, 5vw, 64px);
        font-weight: 500;
        line-height: 1.1;
        letter-spacing: -0.02em;
        color: var(--text);
        margin-bottom: 10px;
        opacity: 0;
        transform: translateY(16px);
        transition: opacity 0.5s 0.1s, transform 0.5s 0.1s;
      }

      .trip-row.revealed .trip-destination {
        opacity: 1;
        transform: translateY(0);
      }

      .trip-route {
        font-style: italic;
        font-size: 14px;
        color: var(--text-secondary);
        margin-bottom: 16px;
        line-height: 1.5;
        opacity: 0;
        transform: translateY(16px);
        transition: opacity 0.5s 0.15s, transform 0.5s 0.15s;
      }

      .trip-row.revealed .trip-route {
        opacity: 1;
        transform: translateY(0);
      }

      .trip-meta {
        display: flex;
        align-items: center;
        gap: 20px;
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
        opacity: 0;
        transform: translateY(16px);
        transition: opacity 0.5s 0.2s, transform 0.5s 0.2s;
      }

      .trip-row.revealed .trip-meta {
        opacity: 1;
        transform: translateY(0);
      }

      .trip-meta span {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .trip-meta .sep {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: var(--muted);
        flex-shrink: 0;
      }

      .trip-arrow {
        flex-shrink: 0;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.3s, border-color 0.3s, background 0.3s;
        opacity: 0;
        transform: translateX(-10px);
        transition: opacity 0.5s 0.25s, transform 0.5s 0.25s, border-color 0.3s, background 0.3s;
      }

      [data-theme="light"] .trip-arrow {
        border-color: rgba(0, 0, 0, 0.15);
      }

      .trip-row.revealed .trip-arrow {
        opacity: 1;
        transform: translateX(0);
      }

      .trip-row:hover .trip-arrow {
        border-color: var(--accent);
        background: var(--accent-dim);
        transform: translateX(6px);
      }

      .trip-arrow svg {
        width: 20px;
        height: 20px;
        stroke: var(--text);
        stroke-width: 1.5;
        fill: none;
        transition: stroke 0.3s;
      }

      .trip-row:hover .trip-arrow svg {
        stroke: var(--accent);
      }

      /* Divider between trip rows */
      .trip-divider {
        height: 1px;
        background: var(--border);
      }

      /* ── FOOTER ── */
      .site-footer {
        border-top: 1px solid var(--border);
        padding: 48px 40px;
        max-width: 1200px;
        margin: 0 auto;
      }

      .footer-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 16px;
      }

      .footer-copy {
        font-size: 13px;
        color: var(--muted);
      }

      .footer-copy a {
        color: var(--text-secondary);
        text-decoration: none;
        transition: color 0.2s;
      }

      .footer-copy a:hover {
        color: var(--accent);
      }

      .footer-links {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .footer-links a {
        color: var(--muted);
        text-decoration: none;
        font-size: 13px;
        transition: color 0.2s;
      }

      .footer-links a:hover {
        color: var(--accent);
      }

      /* ── SCROLL REVEAL ── */
      .reveal {
        opacity: 0;
        transform: translateY(24px);
        transition: opacity 0.6s, transform 0.6s;
      }

      .reveal.visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* ── RESPONSIVE ── */
      @media (max-width: 768px) {
        nav {
          padding: 0 20px;
          height: 56px;
        }

        .nav-links a {
          font-size: 12px;
          padding: 5px 10px;
        }

        .nav-left {
          gap: 16px;
        }

        .hero-content {
          padding: 0 24px 60px;
        }

        .hero-subtitle {
          font-size: 14px;
        }

        .map-section {
          padding: 48px 20px;
        }

        .map-container {
          height: 300px;
          border-radius: 12px;
        }

        .trips-header {
          padding: 0 20px 32px;
        }

        .trip-row {
          height: 60vh;
          min-height: 400px;
        }

        .trip-row-content {
          padding: 0 24px 40px;
          flex-direction: column;
          align-items: flex-start;
          gap: 20px;
        }

        .trip-destination {
          font-size: clamp(28px, 8vw, 42px);
        }

        .trip-route {
          font-size: 13px;
        }

        .trip-meta {
          gap: 12px;
          font-size: 10px;
        }

        .trip-arrow {
          width: 44px;
          height: 44px;
        }

        .trip-arrow svg {
          width: 16px;
          height: 16px;
        }

        .site-footer {
          padding: 40px 20px;
        }

        .footer-inner {
          flex-direction: column;
          align-items: center;
          text-align: center;
          gap: 12px;
        }
      }

      @media (max-width: 480px) {
        .nav-links a {
          font-size: 11px;
          padding: 4px 8px;
        }

        .nav-left {
          gap: 8px;
        }

        .trip-row-content {
          padding: 0 18px 32px;
        }

        .trip-row-bg .flag-placeholder {
          font-size: 80px;
        }
      }
    </style>
  </head>
  <body>

    <!-- NAV -->
    <div class="nav-wrap" id="nav-wrap">
      <nav>
        <div class="nav-left">
          <a class="nav-logo" href="/">Haoming Koo</a>
          <div class="nav-links">
            <a href="/">Portfolio</a>
            <a href="/travel/" class="active">Travel</a>
            <a href="/blog/">Blog</a>
          </div>
        </div>
        <div class="nav-right">
          <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode">
            <svg id="theme-icon-moon" viewBox="0 0 24 24">
              <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79Z" />
            </svg>

              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />

              <line x1="1" y1="12" x2="3" y2="12" />
              <line x1="21" y1="12" x2="23" y2="12" />
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
            </svg>
          </button>
        </div>
      </nav>
    </div>

    <!-- HERO -->
    <section class="hero" id="hero">
      <div class="hero-content">
        <p class="hero-eyebrow">5 trips &middot; 4 countries &middot; 48 days</p>
        <h1 class="hero-headline">Wander deliberately.</h1>
        <p class="hero-subtitle">

        </p>

      <div class="hero-scroll-hint" aria-hidden="true">
        <span></span>
      </div>

    <!-- MAP -->
    <section class="map-section reveal" id="map-section">
      <p class="section-label">Where I've been</p>
      <h2 class="section-heading">The map so far</h2>
      <div class="map-container" id="map-container"></div>
    </section>

    <!-- TRIPS -->
    <section class="trips-section">
      <div class="trips-header reveal">
        <p class="section-label">Dispatches</p>
        <h2 class="section-heading">Trip journals</h2>
      </div>
      <div id="trip-rows"></div>
    </section>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="footer-inner">
        <div class="footer-copy">
          &copy; 2026 Haoming Koo &middot; <a href="/">Back to portfolio</a>
        </div>
        <div class="footer-links">
          <a href="https://github.com/haomingkoo" target="_blank" rel="noopener">GitHub</a>
          <a href="https://www.linkedin.com/in/haomingkoo/" target="_blank" rel="noopener">LinkedIn</a>
        </div>
      </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    (function () {
      "use strict";

      /* ── TRIP DATA ── */
      var trips = [
        {
          num: "01",
          slug: "netherlands",
          destination: "Netherlands",
          date: "2025-04-19",
          dateLabel: "APR 2025",
          season: "Spring",
          days: 9,
          readTime: "14 min",
          route: "Amsterdam - Keukenhof - Delft - Rotterdam - Kinderdijk",
          flag: "\uD83C\uDDF3\uD83C\uDDF1",
          lat: 52.2,
          lng: 5.0
        },

      ];

      /* ── THEME ── */
      var savedTheme = localStorage.getItem("travel-theme");
      var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      var currentTheme = savedTheme || (prefersDark ? "dark" : "dark");
      var tileLayer = null;

      function applyTheme(theme) {
        currentTheme = theme;
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("travel-theme", theme);

        var moonIcon = document.getElementById("theme-icon-moon");
        var sunIcon = document.getElementById("theme-icon-sun");
        if (theme === "light") {
          moonIcon.style.display = "none";
          sunIcon.style.display = "block";
        } else {
          moonIcon.style.display = "block";
          sunIcon.style.display = "none";
        }

        if (tileLayer && map) {
          map.removeLayer(tileLayer);
          tileLayer = createTileLayer(theme);
          tileLayer.addTo(map);
        }
      }

      function createTileLayer(theme) {
        var url = theme === "light"
          ? "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png"
          : "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png";
        return L.tileLayer(url, {
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
          maxZoom: 19,
          subdomains: "abcd"
        });
      }

      document.getElementById("theme-toggle").addEventListener("click", function () {
        applyTheme(currentTheme === "dark" ? "light" : "dark");
      });

      /* ── NAV SCROLL ── */
      var navWrap = document.getElementById("nav-wrap");
      var scrollThreshold = 60;

      function handleNavScroll() {
        if (window.scrollY > scrollThreshold) {
          navWrap.classList.add("scrolled");
        } else {
          navWrap.classList.remove("scrolled");
        }
      }

      window.addEventListener("scroll", handleNavScroll, { passive: true });

      /* ── MAP ── */
      var map = L.map("map-container", {
        zoomControl: true,
        scrollWheelZoom: false
      }).setView([30, 80], 3);

      tileLayer = createTileLayer(currentTheme);
      tileLayer.addTo(map);

      var markerBounds = [];

      trips.forEach(function (trip) {
        if (trip.lat && trip.lng) {
          var marker = L.circleMarker([trip.lat, trip.lng], {
            radius: 8,
            fillColor: "#E8C87A",
            fillOpacity: 0.9,
            color: currentTheme === "light" ? "#f5f2eb" : "#000000",
            weight: 2
          }).addTo(map);

          marker.bindPopup(
            '<strong>' + trip.destination + '</strong>' +
            '<div class="popup-date">' + trip.dateLabel + '</div>'
          );

          markerBounds.push([trip.lat, trip.lng]);
        }
      });

      if (markerBounds.length > 1) {
        map.fitBounds(markerBounds, { padding: [50, 50], maxZoom: 5 });
      } else if (markerBounds.length === 1) {
        map.setView(markerBounds[0], 5);
      }

      /* ── RENDER TRIP ROWS ── */
      var tripContainer = document.getElementById("trip-rows");

      trips.forEach(function (trip, index) {
        // Divider between rows
        if (index > 0) {
          var divider = document.createElement("div");
          divider.className = "trip-divider";
          tripContainer.appendChild(divider);
        }

        var row = document.createElement("a");
        row.className = "trip-row";
        row.href = "./posts/" + trip.slug + ".html";

        row.innerHTML =
          '<div class="trip-row-bg">' +
            '<span class="flag-placeholder" aria-hidden="true">' + trip.flag + '</span>' +
          '</div>' +
          '<div class="trip-row-overlay"></div>' +
          '<div class="trip-row-content">' +
            '<div class="trip-row-text">' +
              '<p class="trip-number">' + trip.num + ' - ' + trip.dateLabel + '</p>' +
              '<h3 class="trip-destination">' + trip.destination + '</h3>' +
              '<p class="trip-route">' + trip.route + '</p>' +
              '<div class="trip-meta">' +
                '<span>' + trip.days + ' days</span>' +
                '<span class="sep"></span>' +
                '<span>' + trip.season + '</span>' +
                '<span class="sep"></span>' +
                '<span>' + trip.readTime + ' read</span>' +
              '</div>' +
            '</div>' +
            '<div class="trip-arrow">' +
              '<svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>' +
            '</div>' +
          '</div>';

        tripContainer.appendChild(row);
      });

      /* ── SCROLL REVEAL ── */
      function createObserver(selector, options) {
        var elements = document.querySelectorAll(selector);
        if (!elements.length) return;

        var observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add(options.activeClass || "visible");
              if (options.once !== false) {
                observer.unobserve(entry.target);
              }
            }
          });
        }, {
          threshold: options.threshold || 0.15,
          rootMargin: options.rootMargin || "0px"
        });

        elements.forEach(function (el) {
          observer.observe(el);
        });
      }

      // Generic reveal elements
      createObserver(".reveal", {
        activeClass: "visible",
        threshold: 0.1,
        once: true
      });

      // Trip rows
      createObserver(".trip-row", {
        activeClass: "revealed",
        threshold: 0.2,
        rootMargin: "0px 0px -50px 0px",
        once: true
      });

      /* ── INIT THEME ── */
      applyTheme(currentTheme);

    })();
    </script>
