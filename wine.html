  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0d;
      --surface: #12121a;
      --surface-2: #0f0f14;
      --surface-hover: #1a1a24;
      --border: #1e1e2a;
      --border-light: #2a2a38;
      --wine: #9b2335;
      --wine-dim: rgba(155,35,53,.12);
      --wine-glow: rgba(155,35,53,.25);
      --gold: #c8a960;
      --gold-dim: rgba(200,169,96,.15);
      --text: #e8e4de;
      --text-secondary: #a09a90;
      --muted: #6b6560;
      --good: #4ade80;
      --warn: #fbbf24;
      --bad: #f87171;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      -webkit-text-size-adjust: 100%;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      background-image:
        radial-gradient(ellipse at 50% 0%, rgba(155,35,53,.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(200,169,96,.03) 0%, transparent 50%);
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px 60px; }

    /* ── Nav ── */
    nav { display: flex; align-items: center; justify-content: space-between; padding: 24px 0 20px; }
    .nav-logo { font-size: 16px; font-weight: 700; letter-spacing: .05em; color: var(--text); text-decoration: none; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 13px; letter-spacing: .02em; transition: color .2s; }
    .nav-links a:hover { color: var(--text); }

    /* ── Hero ── */
    .hero { padding: 24px 0 28px; }
    .hero-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .hero-title {
      font-size: clamp(28px, 5.5vw, 44px);
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -.03em;
      background: linear-gradient(135deg, var(--text) 20%, var(--wine) 80%, var(--gold) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero-sub { color: var(--text-secondary); font-size: 14px; margin-top: 6px; font-weight: 300; }
    .status-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 999px;
      padding: 6px 12px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      letter-spacing: .02em;
    }
    .pill strong { color: var(--text); font-weight: 600; }
    .pill--fresh strong { color: var(--good); }
    .pill--stale strong { color: var(--bad); }

    /* ── Metrics Strip ── */
    .metrics { display: flex; gap: 1px; background: var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
    .metric {
      flex: 1;
      background: var(--surface);
      padding: 14px 16px;
      text-align: center;
    }
    .metric-value { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.02em; }
    .metric-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-top: 2px; font-weight: 600; }

    /* ── Panel ── */
    .panel {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .panel-title {
      font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--muted); font-weight: 600;
    }
    .toggle-btn {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      color: var(--muted); font-size: 11px; padding: 4px 10px; cursor: pointer;
      transition: all .2s;
    }
    .toggle-btn:hover { border-color: var(--wine); color: var(--text); }

    /* ── Filters ── */
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
    .field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
    .field--search { flex: 2; min-width: 200px; }
    .field label { font-size: 10px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; font-weight: 600; }
    .field input, .field select {
      height: 36px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); padding: 0 10px; font-size: 13px; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input:focus, .field select:focus {
      border-color: rgba(155,35,53,.5);
      box-shadow: 0 0 0 2px rgba(155,35,53,.12);
    }
    .field input::placeholder { color: var(--muted); }
    .btn {
      height: 36px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); padding: 0 16px;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s;
      letter-spacing: .02em; white-space: nowrap;
    }
    .btn:hover { border-color: var(--wine); }
    .btn--wine {
      background: linear-gradient(135deg, rgba(155,35,53,.25), rgba(155,35,53,.1));
      border-color: rgba(155,35,53,.4);
    }
    .btn--wine:hover { border-color: var(--wine); background: linear-gradient(135deg, rgba(155,35,53,.35), rgba(155,35,53,.15)); }

    /* ── Sort (collapsible) ── */
    .sort-section { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .sort-section.open { display: block; }
    .sort-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }

    /* ── Error ── */
    .error { color: var(--bad); font-size: 12px; min-height: 16px; margin-top: 8px; }

    /* ── Wine Cards ── */
    .cards { display: flex; flex-direction: column; gap: 2px; }
    .card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 16px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color .2s, background .2s;
      cursor: default;
    }
    .card:hover { border-color: var(--border-light); background: var(--surface-hover); }

    .card-main { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
    .card-top { display: flex; align-items: flex-start; gap: 10px; }
    .card-name { font-weight: 600; font-size: 14px; color: var(--text); line-height: 1.3; word-break: break-word; flex: 1; }
    .card-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .badge {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 10px; font-weight: 600; letter-spacing: .04em;
      padding: 2px 7px; border-radius: 4px;
      text-transform: uppercase;
    }
    .badge--vintage { background: var(--wine-dim); color: var(--wine); border: 1px solid rgba(155,35,53,.2); }
    .badge--volume { background: rgba(200,169,96,.08); color: var(--gold); border: 1px solid rgba(200,169,96,.15); }
    .badge--match { background: rgba(100,100,120,.1); color: var(--text-secondary); border: 1px solid var(--border); }
    .badge--match-exact { color: var(--good); border-color: rgba(74,222,128,.2); background: rgba(74,222,128,.06); }
    .badge--match-none { color: var(--bad); border-color: rgba(248,113,113,.2); background: rgba(248,113,113,.06); }

    .card-prices { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    .price-block { display: flex; flex-direction: column; }
    .price-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }
    .price-value { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: -.01em; }
    .price-trend { font-size: 10px; font-weight: 600; margin-top: 1px; }
    .price-trend--up { color: var(--bad); }
    .price-trend--down { color: var(--good); }
    .price-trend--flat { color: var(--muted); }

    .delta-block { padding: 6px 10px; border-radius: 6px; text-align: center; }
    .delta-block--save { background: rgba(74,222,128,.08); border: 1px solid rgba(74,222,128,.15); }
    .delta-block--loss { background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.15); }
    .delta-block--even { background: rgba(100,100,120,.08); border: 1px solid var(--border); }
    .delta-value { font-size: 15px; font-weight: 700; }
    .delta-value--save { color: var(--good); }
    .delta-value--loss { color: var(--bad); }
    .delta-value--even { color: var(--muted); }
    .delta-label { font-size: 9px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .06em; }

    .card-right { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; gap: 8px; min-width: 120px; }

    .rating-block { text-align: right; }
    .rating-score { font-size: 24px; font-weight: 700; color: var(--gold); letter-spacing: -.02em; }
    .rating-count { font-size: 10px; color: var(--text-secondary); }
    .rating-na { font-size: 13px; color: var(--muted); font-style: italic; }

    .score-ring {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: var(--text);
      border: 2px solid var(--border);
    }
    .score-ring--high { border-color: var(--good); color: var(--good); }
    .score-ring--mid { border-color: var(--gold); color: var(--gold); }
    .score-ring--low { border-color: var(--muted); }

    .card-links { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .card-links a, .card-links button {
      font-size: 11px; color: var(--text-secondary); text-decoration: none;
      padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border);
      background: transparent; cursor: pointer; transition: all .15s;
      font-family: inherit;
    }
    .card-links a:hover, .card-links button:hover { border-color: var(--wine); color: var(--text); }

    /* ── History Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
      z-index: 1000; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 24px; max-width: 700px; width: 100%; max-height: 80vh; overflow-y: auto;
    }
    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
    .modal-close {
      float: right; background: none; border: 1px solid var(--border); border-radius: 6px;
      color: var(--muted); font-size: 12px; padding: 4px 10px; cursor: pointer;
    }
    .modal-close:hover { color: var(--text); border-color: var(--wine); }
    .chart-container { position: relative; width: 100%; height: 260px; margin-top: 12px; }
    .chart-container canvas { width: 100%; height: 100%; }
    .chart-legend { display: flex; gap: 16px; margin-top: 10px; font-size: 11px; color: var(--text-secondary); }
    .chart-legend span::before { content: ''; display: inline-block; width: 10px; height: 3px; border-radius: 2px; margin-right: 5px; vertical-align: middle; }
    .legend-plat::before { background: var(--wine); }
    .legend-gc::before { background: var(--gold); }

    /* ── Loading ── */
    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

    /* ── Responsive ── */
    @media (max-width: 780px) {
      .hero-row { flex-direction: column; align-items: flex-start; }
      .metrics { flex-wrap: wrap; }
      .metric { min-width: 45%; }
      .card { grid-template-columns: 1fr; }
      .card-right { flex-direction: row; align-items: center; justify-content: flex-start; min-width: auto; }
      .rating-block { text-align: left; }
      .container { padding: 0 14px 40px; }
      .filter-row { flex-direction: column; }
      .field { min-width: 0; }
    }
    @media (max-width: 480px) {
      .card-prices { flex-direction: column; gap: 8px; }
      .metric { min-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a class="nav-logo" href="https://kooexperience.com/">HK</a>
      <div class="nav-links">
        <a href="https://kooexperience.com/">Home</a>
        <a href="https://github.com/haomingkoo" target="_blank" rel="noopener">GitHub</a>
      </div>
    </nav>

    <section class="hero">
      <div class="hero-row">
        <div>
          <h1 class="hero-title">Wine Intelligence</h1>
          <p class="hero-sub">Compare Platinum vs Grand Cru prices, enriched with Vivino quality signals.</p>
        </div>
        <div class="status-pills">
          <div class="pill">Pull: <strong id="latestPull">...</strong></div>
          <div class="pill" id="freshnessPill">Status: <strong id="freshnessStatus">...</strong></div>

      </div>
    </section>

    <div class="metrics">
      <div class="metric"><div class="metric-value" id="rowCount">-</div><div class="metric-label">Wines Shown</div></div>
      <div class="metric"><div class="metric-value" id="totalDeals">-</div><div class="metric-label">Total Deals</div></div>
      <div class="metric"><div class="metric-value" id="totalSnapshots">-</div><div class="metric-label">Snapshots</div></div>
      <div class="metric"><div class="metric-value" id="retentionDays">-</div><div class="metric-label">Retention (days)</div></div>
    </div>

    <section class="panel">
      <div class="panel-header">
        <span class="panel-title">Filters</span>
        <button class="toggle-btn" id="sortToggle">Advanced Sort</button>
      </div>
      <form id="filtersForm">
        <div class="filter-row">
          <div class="field field--search">
            <label for="search">Search</label>
            <input id="search" type="text" placeholder="Wine name, region, grape..." />
          </div>
          <div class="field">
            <label for="cheaperSide">Cheaper Side</label>
            <select id="cheaperSide">
              <option value="all" selected>All</option>
              <option value="Platinum Cheaper">Platinum</option>
              <option value="Grand Cru Cheaper">Grand Cru</option>

              <option value="No Match">No Match</option>
            </select>
          </div>
          <div class="field">
            <label for="minRating">Min Rating</label>
            <input id="minRating" type="number" value="0" min="0" max="5" step="0.1" />
          </div>
          <div class="field">
            <label for="maxPrice">Max Price</label>
            <input id="maxPrice" type="number" value="" min="0" step="1" placeholder="No cap" />
          </div>
          <div class="field">
            <label for="sortBy">Sort By</label>
            <select id="sortBy">
              <option value="deal_score" selected>Deal Score</option>
              <option value="vivino_rating">Vivino Rating</option>

      </form>
      <div class="sort-section" id="sortSection">
        <form id="sortForm">
          <div class="sort-row">
            <div class="field"><label>Primary</label><select id="sort1Field">
              <option value="deal_score" selected>Deal Score</option>
              <option value="vivino_rating">Vivino Rating</option>
              <option value="vivino_num_ratings"># Ratings</option>
              <option value="price_diff_pct">% Difference</option>
              <option value="price_platinum">Platinum Price</option>
              <option value="price_grand_cru">Grand Cru Price</option>
              <option value="wine_name">Name</option>
              <option value="vintage">Vintage</option>
            </select></div>
            <div class="field"><label>Dir</label><select id="sort1Order"><option value="desc" selected>Desc</option><option value="asc">Asc</option></select></div>
            <div class="field"><label>Secondary</label><select id="sort2Field">
              <option value="">None</option>
              <option value="vivino_rating">Vivino Rating</option>
              <option value="vivino_num_ratings"># Ratings</option>
              <option value="price_diff_pct">% Difference</option>
              <option value="price_platinum">Platinum Price</option>
              <option value="wine_name">Name</option>
              <option value="vintage">Vintage</option>
            </select></div>
            <div class="field"><label>Dir</label><select id="sort2Order"><option value="desc" selected>Desc</option><option value="asc">Asc</option></select></div>
            <div class="field"><label>Tertiary</label><select id="sort3Field">
              <option value="">None</option>
              <option value="price_diff_pct">% Difference</option>
              <option value="price_platinum">Platinum Price</option>
              <option value="wine_name">Name</option>
              <option value="vintage">Vintage</option>
              <option value="vivino_num_ratings"># Ratings</option>
            </select></div>
            <div class="field"><label>Dir</label><select id="sort3Order"><option value="desc" selected>Desc</option><option value="asc">Asc</option></select></div>
            <div class="field" style="flex:0;"><label>&nbsp;</label><button class="btn btn--wine" type="submit">Sort</button></div>

    <div class="cards" id="cardsContainer">

  <!-- History Modal -->
  <div class="modal-overlay" id="historyModal">

      <button class="modal-close" id="modalClose">Close</button>
      <div class="modal-title" id="modalTitle">Price History</div>
      <div class="modal-sub" id="modalSub">Loading...</div>
      <div class="chart-container"><canvas id="historyChart"></canvas></div>
      <div class="chart-legend">
        <span class="legend-plat">Platinum</span>
        <span class="legend-gc">Grand Cru</span>
      </div>
    </div>

  <script>
    const PRODUCTION_API_BASE = "https://web-production-f2effe.up.railway.app";
    const LOCAL_API_BASE = "http://127.0.0.1:8010";
    const DEBUG_API_PARAM = "api_base";

    const host = window.location.hostname;
    const isLocalHost = host === "localhost" || host === "127.0.0.1";
    const debugApiBase = new URLSearchParams(window.location.search).get(DEBUG_API_PARAM);
    const API_BASE = (debugApiBase || (isLocalHost ? LOCAL_API_BASE : PRODUCTION_API_BASE)).replace(/\/+$/, "");

    let currentRows = [];

    const $ = (id) => document.getElementById(id);
    const ui = {
      rowCount: $("rowCount"), totalDeals: $("totalDeals"), totalSnapshots: $("totalSnapshots"),
      retentionDays: $("retentionDays"), latestPull: $("latestPull"), freshnessStatus: $("freshnessStatus"),
      freshnessPill: $("freshnessPill"), search: $("search"), cheaperSide: $("cheaperSide"),
      minRating: $("minRating"), maxPrice: $("maxPrice"), sortBy: $("sortBy"), sortOrder: $("sortOrder"),
      sort1Field: $("sort1Field"), sort1Order: $("sort1Order"),
      sort2Field: $("sort2Field"), sort2Order: $("sort2Order"),
      sort3Field: $("sort3Field"), sort3Order: $("sort3Order"),
      cards: $("cardsContainer"), error: $("errorText"),
    };

    /* ── Formatters ── */
    function fmtMoney(v) {
      if (v == null || Number.isNaN(v)) return "N/A";
      return "$" + Number(v).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }
    function fmtDate(iso) {
      if (!iso) return "N/A";
      const d = new Date(iso);
      return Number.isNaN(d.getTime()) ? "N/A" : d.toLocaleDateString("en-SG", { day: "numeric", month: "short", year: "numeric" });
    }
    function fmtDateTime(iso) {
      if (!iso) return "N/A";
      const d = new Date(iso);
      return Number.isNaN(d.getTime()) ? "N/A" : d.toLocaleString("en-SG", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" });
    }
    function fmtCount(n) {
      if (n == null) return "N/A";
      if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, "") + "k";
      return String(n);
    }
    function fmtPctDelta(v) {
      if (v == null || Number.isNaN(v)) return { text: "N/A", cls: "even" };
      if (v < 0) return { text: v.toFixed(1) + "%", cls: "save" };
      if (v > 0) return { text: "+" + v.toFixed(1) + "%", cls: "loss" };
      return { text: "0%", cls: "even" };
    }

    function trendHtml(change, label) {
      if (change == null) return `<span class="price-trend price-trend--flat">${label}: --</span>`;
      const sign = change > 0 ? "+" : "";
      const cls = change > 0 ? "up" : change < 0 ? "down" : "flat";
      return `<span class="price-trend price-trend--${cls}">${label}: ${sign}${fmtMoney(change)}</span>`;
    }

    function matchBadgeCls(method) {
      if (!method || method === "none") return "badge--match-none";
      if (method === "exact") return "badge--match-exact";
      return "badge--match";
    }

    function scoreRingCls(score) {
      if (score >= 60) return "score-ring--high";
      if (score >= 30) return "score-ring--mid";
      return "score-ring--low";
    }

    /* ── API ── */
    async function fetchJson(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      return res.json();
    }

    function buildDealsUrl() {
      const p = new URLSearchParams();
      p.set("limit", "500");
      p.set("offset", "0");
      p.set("only_platinum_cheaper", "false");
      const search = ui.search.value.trim();
      const cs = ui.cheaperSide.value.trim();
      const mr = Number(ui.minRating.value);
      const mp = ui.maxPrice.value.trim();
      if (search) p.set("search", search);
      if (cs && cs !== "all") p.set("cheaper_side", cs);
      if (mr > 0) p.set("min_vivino_rating", String(mr));
      if (mp) p.set("max_platinum_price", mp);
      p.set("sort_by", ui.sortBy.value);
      p.set("sort_order", ui.sortOrder.value);
      return `${API_BASE}/deals?${p}`;
    }

    /* ── Sort ── */
    function cmpVal(a, b, order) {
      const am = a == null || Number.isNaN(a), bm = b == null || Number.isNaN(b);
      if (am && bm) return 0;
      if (am) return 1;
      if (bm) return -1;
      let r = typeof a === "string" ? String(a).localeCompare(String(b), undefined, { sensitivity: "base" }) : a - b;
      return order === "asc" ? r : -r;
    }
    function sortVal(row, f) {
      if (!f) return null;
      return f === "wine_name" ? (row.wine_name || "") : (row[f] ?? null);
    }
    function getSortCriteria() {
      return [
        { field: ui.sort1Field.value, order: ui.sort1Order.value },
        { field: ui.sort2Field.value, order: ui.sort2Order.value },
        { field: ui.sort3Field.value, order: ui.sort3Order.value },
      ].filter(c => c.field);
    }
    function sortRows(rows) {
      const c = getSortCriteria();
      if (!c.length) return [...rows];
      return [...rows].sort((a, b) => {
        for (const { field, order } of c) {
          const r = cmpVal(sortVal(a, field), sortVal(b, field), order);
          if (r !== 0) return r;
        }
        return (a.id || 0) - (b.id || 0);
      });
    }

    /* ── Render Cards ── */
    function renderCards(rows) {
      ui.rowCount.textContent = String(rows.length);
      if (!rows.length) {
        ui.cards.innerHTML = '<div class="loading">No wines match the current filters.</div>';
        return;
      }
      ui.cards.innerHTML = rows.map(row => {
        const d = fmtPctDelta(row.price_diff_pct);
        const rating = row.vivino_rating != null ? Number(row.vivino_rating).toFixed(1) : null;
        const count = row.vivino_num_ratings != null ? fmtCount(row.vivino_num_ratings) : null;
        const method = row.vivino_match_method || "none";
        const score = Math.round(row.deal_score || 0);

        const metaBadges = [
          row.vintage ? `<span class="badge badge--vintage">${row.vintage}</span>` : "",
          row.volume ? `<span class="badge badge--volume">${row.volume}</span>` : "",
          row.quantity && row.quantity > 1 ? `<span class="badge badge--volume">${row.quantity}x</span>` : "",
          `<span class="badge ${matchBadgeCls(method)}">${method}</span>`,
        ].filter(Boolean).join("");

        const platTrend7 = trendHtml(row.price_platinum_change_7d, "7d");
        const platTrend30 = trendHtml(row.price_platinum_change_30d, "30d");

        const links = [
          row.platinum_url ? `<a href="${row.platinum_url}" target="_blank" rel="noopener">Platinum</a>` : "",
          row.grand_cru_url ? `<a href="${row.grand_cru_url}" target="_blank" rel="noopener">Grand Cru</a>` : "",
          row.vivino_url ? `<a href="${row.vivino_url}" target="_blank" rel="noopener">Vivino</a>` : "",
          `<button onclick="showHistory(${row.id}, '${(row.wine_name || "").replace(/'/g, "\\'")}')">History</button>`,
        ].filter(Boolean).join("");

        return `
          <div class="card">
            <div class="card-main">
              <div class="card-top">
                <div class="card-name">${row.wine_name || "Unknown"}</div>
              </div>
              <div class="card-meta">${metaBadges}</div>
              <div class="card-prices">
                <div class="price-block">
                  <span class="price-label">Platinum</span>
                  <span class="price-value">${fmtMoney(row.price_platinum)}</span>
                  ${platTrend7}
                  ${platTrend30}
                </div>
                <div class="price-block">
                  <span class="price-label">Grand Cru</span>
                  <span class="price-value">${fmtMoney(row.price_grand_cru)}</span>
                </div>
                <div class="delta-block delta-block--${d.cls}">
                  <div class="delta-value delta-value--${d.cls}">${d.text}</div>
                  <div class="delta-label">${row.cheaper_side || "N/A"}</div>
                </div>
              </div>
              <div class="card-links">${links}</div>
            </div>
            <div class="card-right">
              <div class="rating-block">
                ${rating ? `<div class="rating-score">${rating}</div><div class="rating-count">${count || "N/A"} ratings</div>` : '<div class="rating-na">No rating</div>'}
              </div>
              <div class="score-ring ${scoreRingCls(score)}">${score}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    /* ── Price History Chart ── */
    async function showHistory(dealId, wineName) {
      const modal = $("historyModal");
      const canvas = $("historyChart");
      $("modalTitle").textContent = wineName;
      $("modalSub").textContent = "Loading price history...";
      modal.classList.add("open");

      try {
        const data = await fetchJson(`${API_BASE}/deals/${dealId}/history?days=90&limit=60&sort_order=asc`);
        if (!data.length) {
          $("modalSub").textContent = "No historical data available yet.";
          return;
        }
        $("modalSub").textContent = `${data.length} snapshots over the last 90 days`;
        drawChart(canvas, data);
      } catch (err) {
        $("modalSub").textContent = `Error: ${err.message}`;
      }
    }

    function drawChart(canvas, data) {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      canvas.style.width = rect.width + "px";
      canvas.style.height = rect.height + "px";

      const ctx = canvas.getContext("2d");
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, rect.width, rect.height);

      const W = rect.width, H = rect.height;
      const pad = { top: 20, right: 20, bottom: 36, left: 55 };
      const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;

      const platPrices = data.map(d => d.price_platinum).filter(v => v != null);
      const gcPrices = data.map(d => d.price_grand_cru).filter(v => v != null);
      const allPrices = [...platPrices, ...gcPrices];
      if (!allPrices.length) return;

      const minP = Math.floor(Math.min(...allPrices) * 0.95);
      const maxP = Math.ceil(Math.max(...allPrices) * 1.05);
      const rangeP = maxP - minP || 1;
      const n = data.length;

      const x = (i) => pad.left + (i / Math.max(n - 1, 1)) * cw;
      const y = (v) => pad.top + ch - ((v - minP) / rangeP) * ch;

      // Grid
      ctx.strokeStyle = "#1e1e2a";
      ctx.lineWidth = 1;
      const steps = 5;
      for (let i = 0; i <= steps; i++) {
        const yy = pad.top + (i / steps) * ch;
        ctx.beginPath(); ctx.moveTo(pad.left, yy); ctx.lineTo(W - pad.right, yy); ctx.stroke();
        ctx.fillStyle = "#6b6560";
        ctx.font = "10px Inter, sans-serif";
        ctx.textAlign = "right";
        ctx.fillText("$" + Math.round(minP + ((steps - i) / steps) * rangeP), pad.left - 8, yy + 3);
      }

      // X-axis labels
      const labelEvery = Math.max(1, Math.floor(n / 6));
      ctx.fillStyle = "#6b6560";
      ctx.textAlign = "center";
      for (let i = 0; i < n; i += labelEvery) {
        const d = new Date(data[i].captured_at);
        ctx.fillText(d.toLocaleDateString("en-SG", { day: "numeric", month: "short" }), x(i), H - pad.bottom + 20);
      }

      function drawLine(series, color) {
        const pts = data.map((d, i) => ({ x: x(i), y: d[series] != null ? y(d[series]) : null })).filter(p => p.y != null);
        if (pts.length < 2) return;
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.lineJoin = "round";
        ctx.beginPath();
        pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
        ctx.stroke();
        // Dots
        ctx.fillStyle = color;
        pts.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill(); });
      }

      drawLine("price_platinum", "#9b2335");
      drawLine("price_grand_cru", "#c8a960");
    }

    $("modalClose").onclick = () => $("historyModal").classList.remove("open");
    $("historyModal").onclick = (e) => { if (e.target === $("historyModal")) $("historyModal").classList.remove("open"); };

    /* ── Load Data ── */
    async function loadHealth() {
      const h = await fetchJson(`${API_BASE}/health`);
      ui.totalDeals.textContent = String(h.total_deals ?? 0);
      ui.totalSnapshots.textContent = String(h.total_snapshots ?? 0);
      ui.retentionDays.textContent = String(h.history_retention_days ?? "-");
      ui.latestPull.textContent = fmtDateTime(h.latest_ingestion?.finished_at);
      const stale = h.ingestion_stale;
      ui.freshnessStatus.textContent = stale ? "Stale" : "Fresh";
      ui.freshnessPill.className = stale ? "pill pill--stale" : "pill pill--fresh";
    }

    async function loadDeals() {
      const rows = await fetchJson(buildDealsUrl());
      currentRows = Array.isArray(rows) ? rows : [];
      renderCards(sortRows(currentRows));
    }

    async function refresh() {
      ui.error.textContent = "";
      try {
        await Promise.all([loadHealth(), loadDeals()]);
      } catch (err) {
        ui.cards.innerHTML = '<div class="loading">Unable to load data.</div>';
        ui.error.textContent = `Failed: ${err.message}`;
      }
    }

    $("filtersForm").addEventListener("submit", (e) => { e.preventDefault(); refresh(); });
    $("sortForm").addEventListener("submit", (e) => { e.preventDefault(); renderCards(sortRows(currentRows)); });
    $("sortToggle").addEventListener("click", () => $("sortSection").classList.toggle("open"));

    refresh();
  </script>
</body>
</html>
